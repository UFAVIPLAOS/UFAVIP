<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UFAVIP</title>

<style>
body{
margin:0;
background:#0f1117;
font-family:Arial,sans-serif;
text-align:center;
}

.logo{
width:220px;
max-width:80%;
margin:30px auto;
display:block;
}

.banner{
width:95%;
max-width:1000px;
display:block;
margin:15px auto;
border-radius:15px;
}

.whatsapp{
display:inline-flex;
align-items:center;
justify-content:center;
gap:12px;
padding:16px 34px;
margin:20px auto 30px;
border:none;
border-radius:60px;
text-decoration:none;
font-size:18px;
font-weight:700;
color:#fff;

background:linear-gradient(135deg,#25D366,#1EBE5D,#128C7E);
background-size:300% 300%;

box-shadow:
0 10px 25px rgba(37,211,102,.35),
0 0 25px rgba(37,211,102,.25);

transition:all .35s ease;

animation:
gradientMove 6s ease infinite,
pulse 2s infinite;
}

.whatsapp:hover{
transform:translateY(-4px) scale(1.05);
box-shadow:
0 18px 45px rgba(37,211,102,.55),
0 0 35px rgba(37,211,102,.45);
}

.whatsapp:active{
transform:scale(.97);
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

@keyframes pulse{
0%{
box-shadow:
0 0 0 0 rgba(37,211,102,.45),
0 10px 25px rgba(37,211,102,.35);
}
70%{
box-shadow:
0 0 0 18px rgba(37,211,102,0),
0 10px 25px rgba(37,211,102,.35);
}
100%{
box-shadow:
0 0 0 0 rgba(37,211,102,0),
0 10px 25px rgba(37,211,102,.35);
}
}

.footer{
height:30px;
}
</style>

</head>
<body>

<img src="logo.png.PNG" class="logo">

href="https://wa.me/8562097116626"
