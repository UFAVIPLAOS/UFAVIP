<title>ທາງເຂົ້າເວັບ | UFAVIP</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(180deg,#05070f,#0c1120,#151d33);

color:#fff;

padding:30px;

text-align:center;

}

.logo{

width:280px;

max-width:90%;

margin:20px auto;

display:block;

}

h1{

margin:20px 0;

font-size:30px;

color:#FFD700;

}

.subtitle{

color:#ccc;

margin-bottom:35px;

font-size:18px;

}

.link{

display:block;

width:90%;

max-width:500px;

margin:18px auto;

padding:18px;

border-radius:60px;

text-decoration:none;

font-size:20px;

font-weight:bold;

color:#fff;

background:linear-gradient(135deg,#ff9800,#ff6a00);

transition:.3s;

box-shadow:0 10px 30px rgba(255,140,0,.35);

}

.link:hover{

transform:translateY(-5px);

}

.back{

display:block;

margin:45px auto 0;

width:90%;

max-width:500px;

padding:18px;

border-radius:60px;

text-decoration:none;

font-size:20px;

font-weight:bold;

color:#fff;

background:linear-gradient(135deg,#25D366,#18b95a);

}

</style>

</head>
